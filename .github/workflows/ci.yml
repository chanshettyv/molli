name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: |
          uv run mypy chat-service
          uv run mypy sync-job
          uv run mypy shared

      - name: Test
        env:
          GCP_PROJECT_ID: test-project
          GCP_PROJECT_NUMBER: "000000000000"
        run: uv run pytest --cov --cov-report=xml --cov-report=term

      - name: Coverage gate
        run: |
          uv run python -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('coverage.xml').getroot()
          rate = float(root.get('line-rate', 0)) * 100
          print(f'Coverage: {rate:.1f}%')
          assert rate >= 30.0, f'Coverage gate failed: {rate:.1f}% < 30.0%'
          "
