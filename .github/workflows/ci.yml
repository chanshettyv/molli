name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy chat-service sync-job shared

      - name: Test
        run: uv run pytest --cov --cov-report=xml --cov-report=term

      - name: Coverage gate
        run: |
          # Phase 0: warn only. Tighten to fail < 80% before Phase 3.
          uv run python -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('coverage.xml').getroot()
          rate = float(root.get('line-rate', 0)) * 100
          print(f'Coverage: {rate:.1f}%')
          "
