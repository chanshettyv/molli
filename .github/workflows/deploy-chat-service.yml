name: Deploy chat-service

on:
  push:
    branches: [main]
    paths:
      - 'chat-service/**'
      - 'shared/**'
      - '.github/workflows/deploy-chat-service.yml'
  workflow_dispatch:

env:
  PROJECT_ID: molli-dev
  REGION: us-central1
  SERVICE: molli-chat-service
  REPO: molli
  ENVIRONMENT: dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Resolve project number
        run: |
          PROJECT_NUMBER=$(gcloud projects describe ${{ env.PROJECT_ID }} --format='value(projectNumber)')
          echo "PROJECT_NUMBER=$PROJECT_NUMBER" >> $GITHUB_ENV

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}
          docker build -f chat-service/Dockerfile -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --no-allow-unauthenticated \
            --service-account=${{ secrets.GCP_RUNTIME_SA }} \
            --set-env-vars=GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCP_PROJECT_NUMBER=${{ env.PROJECT_NUMBER }},ENVIRONMENT=${{ env.ENVIRONMENT }},HR_ESCALATION_WEBHOOK_URL=${{ secrets.HR_ESCALATION_WEBHOOK_URL }} \
            --set-secrets=FRESHSERVICE_API_KEY=freshservice-api-key:latest
